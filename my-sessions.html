<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - My Sessions</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; color: #1e293b; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <!-- ===================== TOP NAVBAR ===================== -->
    <header class="bg-slate-950 border-b border-slate-800 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo -->
                <div class="flex items-center gap-3">
                    <a href="customer.html" class="flex items-center gap-2.5 no-underline">
                        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-600 to-emerald-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                            <i class="fa-solid fa-square-p text-white text-lg"></i>
                        </div>
                        <div>
                            <span class="text-lg font-extrabold tracking-wider bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">SmartPark</span>
                            <span class="block text-[9px] text-slate-500 font-semibold tracking-widest uppercase leading-none">Parking System</span>
                        </div>
                    </a>
                </div>

                <!-- Center: Desktop Nav -->
                <nav class="hidden lg:flex items-center gap-1">
                    <a href="book-parking.html" class="px-4 py-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition-all duration-300">
                        <i class="fa-solid fa-calendar-check mr-1.5"></i>Book Parking
                    </a>
                    <a href="my-sessions.html" class="px-4 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white shadow-lg shadow-blue-500/20 transition-all duration-300">
                        <i class="fa-solid fa-car-side mr-1.5"></i>My Sessions
                    </a>
                    <a href="my-history.html" class="px-4 py-2 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition-all duration-300">
                        <i class="fa-solid fa-clock-rotate-left mr-1.5"></i>My History
                    </a>
                </nav>

                <!-- Right: Actions -->
                <div class="flex items-center gap-3">
                    <button onclick="refreshData()" class="w-9 h-9 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white flex items-center justify-center transition-colors" title="Refresh">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                    <a href="index.html" class="hidden sm:inline-flex items-center gap-1.5 px-3.5 py-2 text-xs font-semibold bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 rounded-lg transition-all border border-red-500/20 no-underline">
                        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

        <div class="mb-6">
            <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900">My Sessions</h2>
            <p class="text-sm text-slate-500 mt-1">View and manage your active parking sessions.</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <h3 class="text-lg font-bold text-slate-900">Active Sessions</h3>
                <span class="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-semibold border border-blue-200" id="my-sessions-count">0 Active</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                            <th class="pb-3.5 px-3">Booking ID</th>
                            <th class="pb-3.5 px-3">Zone</th>
                            <th class="pb-3.5 px-3">Slot</th>
                            <th class="pb-3.5 px-3">Entry Time</th>
                            <th class="pb-3.5 px-3">Duration</th>
                            <th class="pb-3.5 px-3">Current Cost</th>
                            <th class="pb-3.5 px-3">Status</th>
                            <th class="pb-3.5 px-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="my-sessions-table-body" class="text-xs text-slate-700 font-medium"></tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- ===================== TOAST CONTAINER ===================== -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <!-- ===================== JAVASCRIPT ===================== -->
    <script>
        // ============================================================
        // DATA
        // ============================================================
        const zonesData = {
            'Zone-A': { id: 'Zone-A', name: 'Zone A', location: 'Ground Floor, Main Building', spots: 50, occupied: 27, free: 23, rate: 3.50, type: 'Covered', status: 'Active', lat: 23.79400, lng: 90.40400 },
            'Zone-B': { id: 'Zone-B', name: 'Zone B', location: 'Rooftop Level 5', spots: 80, occupied: 45, free: 35, rate: 2.00, type: 'Rooftop', status: 'Active', lat: 23.81500, lng: 90.40100 },
            'Zone-C': { id: 'Zone-C', name: 'Zone C', location: 'Underground Parking, B1', spots: 120, occupied: 98, free: 22, rate: 5.00, type: 'Underground', status: 'Active', lat: 23.80700, lng: 90.40600 },
            'Zone-D': { id: 'Zone-D', name: 'Zone D', location: 'Open Lot, East Wing', spots: 30, occupied: 12, free: 18, rate: 1.50, type: 'Open Air', status: 'Active', lat: 23.81200, lng: 90.41500 },
            'Zone-E': { id: 'Zone-E', name: 'Zone E', location: 'West Annex', spots: 40, occupied: 0, free: 40, rate: 2.50, type: 'Covered', status: 'Maintenance', lat: 23.80100, lng: 90.39500 }
        };
        let sessions = [];
        let history = [];
        let nextBookingId = 1000;
        let nextHistoryId = 2000;

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderSessions();
        });

        // ============================================================
        // REFRESH
        // ============================================================
        function refreshData() {
            loadData();
            renderSessions();
            showToast('info', 'Data refreshed!');
        }

        // ============================================================
        // LOCAL STORAGE (shared across all 3 pages)
        // ============================================================
        function loadData() {
            try {
                var saved = localStorage.getItem('customerParkingData');
                if (saved) {
                    var d = JSON.parse(saved);
                    sessions = d.sessions || [];
                    history = d.history || [];
                    nextBookingId = d.nextId || 1000;
                    nextHistoryId = d.nextHistId || 2000;
                }
            } catch(e) {}
        }
        function saveData() {
            localStorage.setItem('customerParkingData', JSON.stringify({
                sessions: sessions,
                history: history,
                nextId: nextBookingId,
                nextHistId: nextHistoryId
            }));
        }

        function syncZoneOccupancy() {
            Object.values(zonesData).forEach(function(z) { z.occupied = 0; });
            sessions.forEach(function(s) {
                if (s.status === 'Active') {
                    var zone = Object.values(zonesData).find(function(z) { return z.name === s.zone; });
                    if (zone) zone.occupied = (zone.occupied || 0) + 1;
                }
            });
            Object.values(zonesData).forEach(function(z) {
                z.free = Math.max(0, z.spots - z.occupied);
            });
        }

        // ============================================================
        // MY SESSIONS
        // ============================================================
        function renderSessions() {
            var tbody = document.getElementById('my-sessions-table-body');
            var countLabel = document.getElementById('my-sessions-count');
            if (!tbody) return;
            var active = sessions.filter(function(s) { return s.status === 'Active'; });
            countLabel.textContent = active.length + ' Active';
            tbody.innerHTML = '';
            if (active.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-slate-400"><i class="fa-solid fa-inbox text-2xl mb-2"></i><p class="text-xs font-medium">No active sessions</p></td></tr>';
                return;
            }
            active.forEach(function(s) {
                tbody.innerHTML += '<tr class="border-b border-slate-100 hover:bg-slate-50/50">' +
                    '<td class="py-3.5 px-3 font-bold text-slate-900">#' + s.id + '</td>' +
                    '<td class="py-3.5 px-3 text-slate-600">' + s.zone + '</td>' +
                    '<td class="py-3.5 px-3 font-semibold text-slate-700">' + s.slot + '</td>' +
                    '<td class="py-3.5 px-3 text-slate-500">' + s.entryTime + '</td>' +
                    '<td class="py-3.5 px-3 text-slate-500">' + s.duration + 'h</td>' +
                    '<td class="py-3.5 px-3 font-semibold text-slate-700">&#x9F3;' + s.cost.toFixed(2) + '</td>' +
                    '<td class="py-3.5 px-3"><span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200">Active</span></td>' +
                    '<td class="py-3.5 px-3 text-right"><button onclick="endSession(' + s.id + ')" class="px-3 py-1.5 text-xs font-semibold bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition-colors border border-red-200"><i class="fa-solid fa-stop-circle mr-1"></i>End</button></td></tr>';
            });
        }

        function endSession(sessionId) {
            var idx = sessions.findIndex(function(s) { return s.id === sessionId; });
            if (idx === -1) return;
            var s = sessions[idx];
            if (!confirm('End session for ' + s.vehicle + ' at ' + s.slot + '?')) return;
            s.status = 'Completed';
            var z = Object.values(zonesData).find(function(zone) { return zone.name === s.zone; });
            if (z) { z.occupied = Math.max(0, z.occupied - 1); z.free = z.spots - z.occupied; }
            var durationLabel = s.durationHours ? s.durationHours + 'h' : s.duration + 'h';
            var hist = {
                id: nextHistoryId++,
                bookingId: s.id,
                name: s.name,
                vehicle: s.vehicle,
                zone: s.zone,
                slot: s.slot,
                date: s.date,
                entryTime: s.entryTime,
                exitTime: new Date().toTimeString().slice(0,5),
                duration: durationLabel,
                cost: s.cost,
                payment: s.payment,
                paymentStatus: 'Paid'
            };
            history.push(hist);
            saveData();
            renderSessions();
            showToast('success', 'Session #' + s.id + ' ended. Total: &#x9F3;' + s.cost.toFixed(2));
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(type, message) {
            var container = document.getElementById('toast-container');
            if (!container) return;
            var toast = document.createElement('div');
            var borderClass = 'border-blue-500/30';
            var iconClass = 'fa-solid fa-circle-info text-blue-400';
            if (type === 'success') { borderClass = 'border-emerald-500/30'; iconClass = 'fa-solid fa-circle-check text-emerald-400'; }
            else if (type === 'error') { borderClass = 'border-red-500/30'; iconClass = 'fa-solid fa-circle-exclamation text-red-400'; }
            toast.className = 'flex items-center gap-3 p-4 rounded-xl border ' + borderClass + ' bg-slate-900/95 shadow-2xl pointer-events-auto max-w-sm w-full transition-all duration-300 transform translate-y-2 opacity-0';
            toast.innerHTML = '<div class="flex-shrink-0 text-lg"><i class="' + iconClass + '"></i></div><div class="flex-grow"><p class="text-xs font-semibold text-slate-200">' + message + '</p></div><button class="text-slate-500 hover:text-slate-300 transition-colors" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark text-xs"></i></button>';
            container.appendChild(toast);
            setTimeout(function() { toast.classList.remove('translate-y-2', 'opacity-0'); }, 50);
            setTimeout(function() { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(function() { toast.remove(); }, 300); }, 4000);
        }
    </script>
</body>
</html>
